version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: saferoute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saferoute
      POSTGRES_PASSWORD: saferoute_pass
      POSTGRES_DB: saferoute_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saferoute-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: saferoute-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-services:
    build:
      context: ./ai-services
    container_name: saferoute-ai-services
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./ai-services:/app

volumes:
  postgres_data:
